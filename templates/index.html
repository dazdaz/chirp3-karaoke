<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chirp Karaoke Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        
        /* Karaoke Styles */
        .lyric-line { 
            transition: all 0.3s ease; 
            opacity: 0.5; 
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }
        .lyric-line:hover { background: rgba(255,255,255,0.1); opacity: 0.8; }
        
        .lyric-active { 
            opacity: 1; 
            transform: scale(1.05); 
            color: #facc15; /* Yellow */
            font-weight: 900;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-gradient-to-br from-slate-900 to-black">

    <div class="glass w-full max-w-6xl p-6 shadow-2xl grid grid-cols-1 lg:grid-cols-12 gap-6 h-[85vh]">
        
        <!-- LEFT: Controls (3 Cols) -->
        <div class="lg:col-span-4 flex flex-col gap-4 border-r border-white/10 pr-6">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                KARAOKE PRO
            </h1>

            <!-- Song Select -->
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Select Track</label>
                <select id="songSelect" class="w-full mt-2 bg-slate-800 border border-slate-600 rounded-xl p-3 text-white outline-none">
                    <option value="" disabled selected>Choose a song...</option>
                    {% for song in songs %}
                        <option value="{{ song.id }}" 
                                data-file="{{ url_for('static', filename='songs/' + song.filename) }}"
                                data-map='{{ song.lyrics_map | tojson | safe }}'>
                            {{ song.title }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <audio id="audioPlayer" controls class="w-full"></audio>
            
            <div class="mt-auto">
                <div class="flex gap-3 mb-4">
                    <button id="recordBtn" disabled class="flex-1 py-4 rounded-xl bg-green-600 hover:bg-green-500 disabled:bg-slate-700 disabled:opacity-50 font-bold transition-all">
                        🎤 SING
                    </button>
                    <button id="stopBtn" disabled class="flex-1 py-4 rounded-xl bg-red-600 hover:bg-red-500 disabled:bg-slate-700 disabled:opacity-50 font-bold transition-all">
                        ⏹ STOP
                    </button>
                </div>
                <div id="status" class="text-center text-blue-400 text-xs font-bold uppercase">Ready</div>
            </div>
        </div>

        <!-- RIGHT: Teleprompter (8 Cols) -->
        <div class="lg:col-span-8 flex flex-col relative overflow-hidden bg-slate-900/50 rounded-2xl border border-white/5">
            <!-- Scrollable Lyrics Container -->
            <div id="lyricsContainer" class="flex-1 overflow-y-auto p-8 text-center space-y-4 scroll-smooth">
                <div class="text-gray-500 italic mt-20">Select a song to load lyrics...</div>
            </div>
            
            <!-- Score Overlay -->
            <div id="scoreOverlay" class="absolute inset-0 bg-black/90 hidden flex-col items-center justify-center z-20">
                <div class="text-6xl font-black text-yellow-400 mb-2" id="scoreValue">0%</div>
                <div class="text-gray-300 mb-6">Match Score</div>
                <button onclick="closeScore()" class="px-6 py-2 bg-slate-700 rounded-full hover:bg-slate-600">Close</button>
            </div>
        </div>
    </div>

    <script>
        const songSelect = document.getElementById('songSelect');
        const audioPlayer = document.getElementById('audioPlayer');
        const lyricsContainer = document.getElementById('lyricsContainer');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('status');
        
        let mediaRecorder, audioChunks = [];
        let currentLyricsMap = [];

        // --- LOAD SONG ---
        songSelect.addEventListener('change', (e) => {
            const opt = e.target.selectedOptions[0];
            
            // 1. Load Audio
            // Cache bust to ensure we get the right file
            audioPlayer.src = opt.dataset.file + "?t=" + Date.now();
            
            // 2. Load Lyrics Map
            currentLyricsMap = JSON.parse(opt.dataset.map);
            renderLyrics(currentLyricsMap);
            
            recordBtn.disabled = false;
            statusDiv.innerText = "Ready to Sing";
        });

        // --- RENDER LYRICS TO DOM ---
        function renderLyrics(map) {
            lyricsContainer.innerHTML = "";
            // Add padding top/bottom so first/last lines center
            let pad = document.createElement('div'); pad.style.height = "40%"; lyricsContainer.appendChild(pad.cloneNode());
            
            map.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = "lyric-line text-2xl md:text-3xl font-bold text-gray-400";
                div.innerText = line.text;
                div.id = "line-" + index;
                div.dataset.time = line.time;
                
                // Click to Seek Feature
                div.onclick = () => {
                    audioPlayer.currentTime = line.time;
                    audioPlayer.play();
                };
                
                lyricsContainer.appendChild(div);
            });
            
            lyricsContainer.appendChild(pad);
        }

        // --- SYNC ENGINE ---
        audioPlayer.ontimeupdate = () => {
            const time = audioPlayer.currentTime;
            
            // Find current active line
            // We look for the line where (currentTime >= lineTime)
            let activeIndex = -1;
            for(let i = 0; i < currentLyricsMap.length; i++) {
                if(time >= currentLyricsMap[i].time) {
                    activeIndex = i;
                } else {
                    break; 
                }
            }

            // Update UI
            document.querySelectorAll('.lyric-line').forEach((el, idx) => {
                if (idx === activeIndex) {
                    el.classList.add('lyric-active');
                    el.classList.remove('text-gray-400');
                    // Auto-scroll
                    el.scrollIntoView({ behavior: "smooth", block: "center" });
                } else {
                    el.classList.remove('lyric-active');
                    el.classList.add('text-gray-400');
                }
            });
        };

        // --- RECORDING LOGIC ---
        recordBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = submitRecording;
                mediaRecorder.start();
                
                audioPlayer.play();
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                statusDiv.innerText = "🔴 Recording...";
            } catch (e) { alert("Mic Error"); }
        });

        stopBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            audioPlayer.pause();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
        });

        async function submitRecording() {
            statusDiv.innerText = "⏳ Scoring...";
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const fd = new FormData();
            fd.append('audio_data', blob);
            fd.append('song_id', songSelect.value);

            const res = await fetch('/transcribe', { method: 'POST', body: fd });
            const data = await res.json();
            
            document.getElementById('scoreOverlay').classList.remove('hidden');
            document.getElementById('scoreOverlay').classList.add('flex');
            document.getElementById('scoreValue').innerText = (data.score || 0) + "%";
            statusDiv.innerText = "Done";
        }

        window.closeScore = () => {
            document.getElementById('scoreOverlay').classList.add('hidden');
            document.getElementById('scoreOverlay').classList.remove('flex');
        };
    </script>
</body>
</html>
